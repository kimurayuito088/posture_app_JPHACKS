<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoseTrack</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="alertFlash" class="alert-flash"></div>
  <div class="app-container">
    <!-- ヘッダー -->
    <header>
      <h1>PoseTrack</h1>
      <p class="subtitle">リアルタイム姿勢モニタリング</p>
    </header>

    <!-- ステータス表示 -->
    <div id="statusBar" class="status-bar status-idle">
      <span id="statusIcon">&#9679;</span>
      <span id="statusText">待機中</span>
    </div>

    <!-- カメラ映像エリア -->
    <div class="camera-area">
      <div id="placeholder" class="camera-placeholder">
        <p>「スタート」を押してカメラを起動</p>
      </div>
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
    </div>

    <!-- 角度表示 -->
    <div id="angleDisplay" class="angle-display" style="display: none;">
      <span class="angle-label">基準からの肩のズレ</span>
      <span id="angleValue" class="angle-value">0.0°</span>
    </div>

    <!-- コントロールボタン -->
    <div class="controls">
      <button id="startButton" class="btn btn-start">スタート</button>
      <button id="stopButton" class="btn btn-stop" disabled>ストップ</button>
    </div>
    <div class="controls">
      <button id="recalibButton" class="btn btn-recalib" disabled>姿勢の基準を取り直す</button>
    </div>

    <!-- オプション -->
    <div class="options-row">
      <div class="option-item">
        <label class="toggle-switch">
          <input type="checkbox" id="skeletonToggle" checked>
          <span class="slider"></span>
        </label>
        <span class="toggle-label">骨格を表示</span>
      </div>
      <div class="option-item">
        <label class="toggle-switch">
          <input type="checkbox" id="soundToggle" checked>
          <span class="slider"></span>
        </label>
        <span class="toggle-label">警告音</span>
      </div>
    </div>

    <!-- エラーメッセージ（カメラ拒否時など） -->
    <div id="errorPanel" class="error-panel" style="display: none;">
      <p id="errorTitle" class="error-title">カメラにアクセスできません</p>
      <p id="errorHelp" class="error-help"></p>
    </div>

    <!-- フッター -->
    <footer>
      <p>映像はお使いの端末内でのみ処理され、外部に送信されません。</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="script.js"></script>
</body>
</html>
