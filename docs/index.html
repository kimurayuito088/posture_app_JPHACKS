<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoseTrack</title>
  <meta name="description" content="リアルタイム姿勢モニタリング - AIが姿勢を分析してアドバイス">
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="alertFlash" class="alert-flash"></div>
  <div class="app-container">
    <!-- ヘッダー -->
    <header>
      <h1>PoseTrack</h1>
      <p class="subtitle">リアルタイム姿勢モニタリング</p>
    </header>

    <!-- ステータス表示 -->
    <div id="statusBar" class="status-bar status-idle">
      <span id="statusIcon">&#9679;</span>
      <span id="statusText">待機中</span>
    </div>

    <!-- カメラ映像エリア -->
    <div class="camera-area">
      <div id="placeholder" class="camera-placeholder">
        <p>「スタート」を押してカメラを起動</p>
      </div>
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
    </div>

    <!-- 角度表示 -->
    <div id="angleDisplay" class="angle-display" style="display: none;">
      <span class="angle-label">基準からの肩のズレ</span>
      <span id="angleValue" class="angle-value">0.0°</span>
    </div>

    <!-- コントロールボタン -->
    <div class="controls">
      <button id="startButton" class="btn btn-start">スタート</button>
      <button id="stopButton" class="btn btn-stop" disabled>ストップ</button>
    </div>
    <div class="controls">
      <button id="recalibButton" class="btn btn-recalib" disabled>姿勢の基準を取り直す</button>
    </div>

    <!-- オプション -->
    <div class="options-row">
      <div class="option-item">
        <label class="toggle-switch">
          <input type="checkbox" id="skeletonToggle" checked>
          <span class="slider"></span>
        </label>
        <span class="toggle-label">骨格を表示</span>
      </div>
      <div class="option-item">
        <label class="toggle-switch">
          <input type="checkbox" id="soundToggle" checked>
          <span class="slider"></span>
        </label>
        <span class="toggle-label">警告音</span>
      </div>
    </div>

    <!-- セッション結果パネル -->
    <div id="sessionPanel" class="session-panel" style="display: none;">
      <h2 class="session-title">セッション結果</h2>
      <div class="session-score" id="sessionScore">0点</div>
      <div class="session-stats">
        <div class="stat-item">
          <span class="stat-label">良い姿勢</span>
          <span class="stat-value stat-good" id="sessionGood">0秒</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">悪い姿勢</span>
          <span class="stat-value stat-bad" id="sessionBad">0秒</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">合計時間</span>
          <span class="stat-value" id="sessionTotal">0秒</span>
        </div>
      </div>
      <p class="session-msg" id="sessionMsg"></p>
      <button id="coachButton" class="btn btn-coach" onclick="requestCoaching()">AI コーチングを受ける</button>
      <p id="coachResult" class="coach-result" style="display: none;"></p>
    </div>

    <!-- セッション履歴パネル -->
    <div id="historyPanel" class="history-panel">
      <div class="history-header">
        <h2 class="session-title">セッション履歴</h2>
        <button id="historyToggle" class="btn-history-toggle" onclick="toggleHistory()">表示</button>
      </div>
      <div id="historyBody" class="history-body" style="display: none;">
        <div id="historyChart" class="history-chart"></div>
        <div id="historyList" class="history-list"></div>
        <p id="historyEmpty" class="history-empty" style="display: none;">まだ記録がありません</p>
      </div>
    </div>

    <!-- エラーメッセージ（カメラ拒否時など） -->
    <div id="errorPanel" class="error-panel" style="display: none;">
      <p id="errorTitle" class="error-title">カメラにアクセスできません</p>
      <p id="errorHelp" class="error-help"></p>
    </div>

    <!-- フッター -->
    <footer>
      <p>映像はお使いの端末内でのみ処理され、外部に送信されません。</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
